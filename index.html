<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>家計簿入力</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f0f4f8;
      min-height: 100%;
      padding: 16px 16px 60px;
      touch-action: manipulation;
    }
    .container { width: 100%; max-width: 500px; margin: 0 auto; }
    h1 {
      text-align: center; font-size: 17px; font-weight: 700; color: #1a202c;
      margin-bottom: 14px; padding: 14px; background: white;
      border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .card {
      background: white; border-radius: 16px; padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 14px;
    }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
    .required { color: #e53e3e; }
    input, select {
      width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 16px; color: #1a202c; background: #f8fafc;
      -webkit-appearance: none; appearance: none;
    }
    input:focus, select:focus { outline: none; border-color: #4299e1; background: white; }
    .amount-wrap { position: relative; }
    .amount-wrap input { padding-left: 28px; font-size: 22px; font-weight: 700; }
    .yen {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      font-size: 17px; font-weight: 700; color: #718096; pointer-events: none;
    }
    .sel-wrap { position: relative; }
    .sel-wrap::after {
      content: '▼'; position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%); font-size: 11px; color: #718096; pointer-events: none;
    }
    .btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white; border: none; border-radius: 12px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 12px rgba(66,153,225,0.4);
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.82; }
    .btn:disabled { background: #a0aec0; box-shadow: none; }
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      color: white; padding: 13px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 600; white-space: pre-line; text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999; width: 88%; max-width: 340px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: linear-gradient(135deg,#38a169,#2f855a); }
    .toast.error   { background: linear-gradient(135deg,#e53e3e,#c53030); }
    .h-title { font-size: 13px; font-weight: 600; color: #718096; margin-bottom: 10px; }
    .h-item {
      background: #f8fafc; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 8px; font-size: 13px; color: #4a5568; border-left: 4px solid #4299e1;
    }
    .h-top { display: flex; justify-content: space-between; margin-bottom: 2px; }
    .h-cat { font-weight: 700; font-size: 14px; }
    .h-amt { font-weight: 700; color: #e53e3e; font-size: 15px; }
    .h-sub { color: #718096; font-size: 12px; }
    .no-h  { text-align: center; color: #a0aec0; font-size: 14px; padding: 8px; }
    .loading { text-align: center; color: #718096; font-size: 14px; padding: 20px; }
  </style>
</head>
<body>
<div class="container">
  <h1>📒 変動費入力</h1>
  <div id="loadingMsg" class="card">
    <div class="loading">⏳ 読み込み中...</div>
  </div>
  <div id="mainForm" style="display:none;">
    <div class="card">
      <div class="field">
        <label>📅 日付<span class="required">*</span></label>
        <input type="date" id="date" required>
      </div>
      <div class="field">
        <label>🏷️ 項目<span class="required">*</span></label>
        <div class="sel-wrap">
          <select id="category"><option value="">選択してください</option></select>
        </div>
      </div>
      <div class="field">
        <label>📝 詳細（任意）</label>
        <input type="text" id="detail" placeholder="例：スーパーベルク、ガソリン等" autocomplete="off">
      </div>
      <div class="field">
        <label>💴 金額<span class="required">*</span></label>
        <div class="amount-wrap">
          <span class="yen">¥</span>
          <input type="number" id="amount" placeholder="0" inputmode="numeric" min="1">
        </div>
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>💳 支払方法<span class="required">*</span></label>
        <div class="sel-wrap">
          <select id="payment"><option value="">選択してください</option></select>
        </div>
      </div>
      <button class="btn" id="btn" onclick="submitForm()">✅ 記録する</button>
    </div>
    <div class="card">
      <div class="h-title">📋 直近の入力履歴</div>
      <div id="hist"><div class="no-h">まだ記録がありません</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  // ▼▼▼ ここにGASのデプロイURLを貼る ▼▼▼
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbzreT668TofdqpEZFAxCqQVqupqmMYEGkLggAc3zjhrHhOAsw2QSOET5MgXxcvDR0YDQw/exec';
  // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

  var log = [];

  window.onload = function() {
    setToday();
    // GASからカテゴリ・支払方法を取得
    fetch(GAS_URL)
      .then(function(r){ return r.json(); })
      .then(function(d) {
        var cs = document.getElementById('category');
        d.categories.forEach(function(c) {
          var o = document.createElement('option');
          o.value = o.textContent = c; cs.appendChild(o);
        });
        var ps = document.getElementById('payment');
        d.paymentMethods.forEach(function(p) {
          var o = document.createElement('option');
          o.value = o.textContent = p; ps.appendChild(o);
        });
        ps.value = 'JCBプラチナ';
        document.getElementById('loadingMsg').style.display = 'none';
        document.getElementById('mainForm').style.display = 'block';
      })
      .catch(function() {
        document.getElementById('loadingMsg').innerHTML = '<div class="loading">❌ 読み込みに失敗しました。<br>再読み込みしてください。</div>';
      });
  };

  function setToday() {
    var t = new Date();
    var y = t.getFullYear();
    var m = String(t.getMonth()+1).padStart(2,'0');
    var d = String(t.getDate()).padStart(2,'0');
    document.getElementById('date').value = y+'-'+m+'-'+d;
  }

  function submitForm() {
    var date     = document.getElementById('date').value;
    var category = document.getElementById('category').value;
    var detail   = document.getElementById('detail').value;
    var amount   = document.getElementById('amount').value;
    var payment  = document.getElementById('payment').value;

    if (!date||!category||!amount||!payment) {
      showToast('⚠️ 日付・項目・金額・支払方法は必須です','error'); return;
    }
    if (parseInt(amount)<=0) { showToast('⚠️ 金額を入力してください','error'); return; }

    var btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = '送信中...';

    fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ date:date, category:category, detail:detail, amount:amount, payment:payment })
    })
    .then(function(r){ return r.json(); })
    .then(function(r) {
      btn.disabled = false; btn.textContent = '✅ 記録する';
      if (r.success) {
        addLog(date,category,detail,parseInt(amount),payment);
        document.getElementById('category').value = '';
        document.getElementById('detail').value   = '';
        document.getElementById('amount').value   = '';
        document.getElementById('payment').value  = 'JCBプラチナ';
        setToday();
        showToast(r.message,'success');
      } else { showToast(r.message,'error'); }
    })
    .catch(function() {
      btn.disabled = false; btn.textContent = '✅ 記録する';
      showToast('❌ 通信エラーが発生しました','error');
    });
  }

  function addLog(date,cat,det,amt,pay) {
    log.unshift({date:date,cat:cat,det:det,amt:amt,pay:pay});
    if(log.length>5) log.pop();
    var h = document.getElementById('hist');
    h.innerHTML = log.map(function(l) {
      var sub = [l.det,l.pay].filter(Boolean).join(' / ');
      return '<div class="h-item">'
        +'<div class="h-top"><span class="h-cat">'+l.cat+'</span>'
        +'<span class="h-amt">¥'+l.amt.toLocaleString()+'</span></div>'
        +'<div class="h-sub">'+l.date.replace(/-/g,'.')+(sub?' ｜ '+sub:'')+'</div>'
        +'</div>';
    }).join('');
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast '+type+' show';
    setTimeout(function(){ t.className='toast'; }, 3200);
  }
</script>
</body>
</html>
